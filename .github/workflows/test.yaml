name: "CI - Test Features"
on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
  workflow_dispatch:

jobs:
  test-autogenerated:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - chezmoi
          - clang
          - persist-ccache-cache
          - persist-claude-mem
          - persist-nix-store
          - persist-nix-var
          - persist-pre-commit-cache
          - persist-shell-history
          - share-host-claude-config
          - share-host-skillshare-config
        baseImage:
          - alpine:3.21
          - alpine:latest
          - debian:bookworm
          - debian:latest
          - ubuntu:jammy
          - ubuntu:noble
          - ubuntu:resolute
          - ubuntu:latest
          - ubuntu:rolling
          - mcr.microsoft.com/devcontainers/base:alpine
          - mcr.microsoft.com/devcontainers/base:debian
          - mcr.microsoft.com/devcontainers/base:ubuntu
        exclude:
          # clang only supports Debian/Ubuntu
          - features: clang
            baseImage: alpine:3.21
          - features: clang
            baseImage: alpine:latest
          - features: clang
            baseImage: mcr.microsoft.com/devcontainers/base:alpine
          # persist-nix-* and share-host-claude-config install.sh require bash, Alpine ships only sh
          - features: persist-nix-store
            baseImage: alpine:3.21
          - features: persist-nix-store
            baseImage: alpine:latest
          - features: persist-nix-store
            baseImage: mcr.microsoft.com/devcontainers/base:alpine
          - features: persist-nix-var
            baseImage: alpine:3.21
          - features: persist-nix-var
            baseImage: alpine:latest
          - features: persist-nix-var
            baseImage: mcr.microsoft.com/devcontainers/base:alpine
          - features: share-host-claude-config
            baseImage: alpine:3.21
          - features: share-host-claude-config
            baseImage: alpine:latest
          - features: share-host-claude-config
            baseImage: mcr.microsoft.com/devcontainers/base:alpine
          # persist-nix-* on mcr.microsoft.com images: remoteUser=vscode causes UID mismatch
          # after updateRemoteUserUID remapping — /nix/store owner UID != running process UID
          - features: persist-nix-store
            baseImage: mcr.microsoft.com/devcontainers/base:debian
          - features: persist-nix-store
            baseImage: mcr.microsoft.com/devcontainers/base:ubuntu
          - features: persist-nix-var
            baseImage: mcr.microsoft.com/devcontainers/base:debian
          - features: persist-nix-var
            baseImage: mcr.microsoft.com/devcontainers/base:ubuntu
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Create stub host directories for share-host-* features"
        run: |
          mkdir -p ~/.claude/agents ~/.claude/skills
          echo "# test CLAUDE.md" > ~/.claude/CLAUDE.md
          mkdir -p ~/.config/skillshare/skills ~/.config/skillshare/extras ~/.config/skillshare/agents
          echo "version: 1" > ~/.config/skillshare/config.yaml
          chmod -R 777 ~/.claude ~/.config/skillshare

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - chezmoi
          - clang
          - persist-ccache-cache
          - persist-claude-mem
          - persist-nix-store
          - persist-nix-var
          - persist-pre-commit-cache
          - persist-shell-history
          - share-host-claude-config
          - share-host-skillshare-config
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Create stub host directories for share-host-* features"
        run: |
          mkdir -p ~/.claude/agents ~/.claude/skills
          echo "# test CLAUDE.md" > ~/.claude/CLAUDE.md
          mkdir -p ~/.config/skillshare/skills ~/.config/skillshare/extras ~/.config/skillshare/agents
          echo "version: 1" > ~/.config/skillshare/config.yaml
          chmod -R 777 ~/.claude ~/.config/skillshare

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated .

  test-global:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .
